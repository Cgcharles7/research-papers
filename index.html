<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Library</title>
    <style>
        :root {
            --sidebar-bg: #1e1e1e;
            --sidebar-text: #d4d4d4;
            --accent: #007acc;
            --hover: #37373d;
        }
        body { display: flex; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; background: #525659; }
        
        #sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #333;
        }

        #sidebar h2 { padding: 20px; margin: 0; font-size: 1.1rem; border-bottom: 1px solid #333; color: white; }

        #file-list { flex-grow: 1; overflow-y: auto; padding: 10px 0; }

        .pdf-link {
            padding: 12px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
        }

        .pdf-link:hover { background: var(--hover); color: white; }
        .pdf-link.active { 
            background: #2d2d2d; 
            border-left: 3px solid var(--accent); 
            color: white; 
            font-weight: bold;
        }

        #viewer-container { flex-grow: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Research Library</h2>
    <div id="file-list"></div>
</div>

<div id="viewer-container">
    <iframe id="pdf-viewer" src="" title="PDF Viewer"></iframe>
</div>

<script>
    // Your actual file list
    const files = [
        "0906.4172.pdf", "10.1.1.134.7307.pdf", "10.1.1.507.2229.pdf", "1005.3750.pdf", 
        "1108.5253.pdf", "1912.12370.pdf", "2007.08800.pdf", "2108.12831.pdf", 
        "2112.13912.pdf", "2303.03349.pdf", "2303.06838.pdf", "2305.15263.pdf", 
        "2306.15696.pdf", "2307.02475.pdf", "2307.05067.pdf", "2308.00073.pdf", 
        "2312.06550v1.pdf", "2409.05746v1.pdf", "2410.02707v4.pdf", "2501.13946v1.pdf", 
        "2505.10468v5.pdf", "2509.15541v1.pdf", "2509.23426v2.pdf", "2512.14474v1.pdf", 
        "2601.08003v1.pdf", "2601.20014v1.pdf", "2602.20021v1.pdf", "2603.03415v2.pdf", 
        "2603.26993v1.pdf", "2604.01151v1.pdf", "2818251.pdf", 
        "Building an Artificial Intelligence Agent_ A Step-by-Step Guide for Entry-Level Engineers (1).pdf", 
        "Happy numbers.pdf", 
        "Large language models hallucinating non-existent developer packages could fuel supply chain attacks _ InfoWorld.PDF", 
        "Latin Squares and Their Applications to Cryptography.pdf", 
        "ch5_association_analysis.pdf", "cryptocurrency-whitepaper.pdf", 
        "maximal-flow-through-a-network.pdf", "paths-trees-and-flowers.pdf"
    ];

    const listContainer = document.getElementById('file-list');
    const viewer = document.getElementById('pdf-viewer');

    function cleanName(name) {
        // Remove .pdf extension and version markers like v1, v2 etc.
        return name.replace(/\.[pP][dD][fF]$/, '').replace(/v\d+$/, '');
    }

    files.forEach((fileName, index) => {
        const link = document.createElement('div');
        link.textContent = cleanName(fileName);
        link.className = 'pdf-link';
        link.title = fileName; // Shows full name on hover
        
        link.onclick = () => {
            viewer.src = encodeURIComponent(fileName);
            document.querySelectorAll('.pdf-link').forEach(el => el.classList.remove('active'));
            link.classList.add('active');
        };

        listContainer.appendChild(link);

        // Load the first one automatically
        if (index === 0) link.click();
    });
</script>

</body>
</html>
